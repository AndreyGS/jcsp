CspProcessorRegistry_Illegal_type_group=Только обычные или обобщенные классы (включая интерфейсы и перечисления) могут быть добавлены. Примитивы и массивы обрабатываются специальным образом.
CspProcessorRegistry_Illegal_class=String.class, Collection.class и Map.class обрабатываются специальным образом, и для них нельзя регистрировать процессоры класса.
